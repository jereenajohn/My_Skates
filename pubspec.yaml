name: my_skates
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Core / API / storage
  http: ^1.5.0
  shared_preferences: ^2.0.15
  intl: ^0.19.0
  provider: ^6.0.5
  flutter_dotenv: ^6.0.0

  # Location / maps
  geolocator: ^10.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.6.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.0

  # Media / files / assets
  image_picker: ^1.1.1
  file_picker: ^8.0.0
  flutter_svg: ^2.0.8
  video_player: ^2.8.2
  chewie: ^1.7.4
  lottie: ^3.1.0

  # UI / animation / charts
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  animations: ^2.1.2
  flutter_carousel_widget: ^3.0.1
  custom_refresh_indicator: ^4.0.1
  liquid_pull_to_refresh: ^3.0.1
  dropdown_button2: ^3.0.0
  swipeable_card_stack: ^0.0.5
  carousel_slider: ^5.0.0

  # Payment / links / sharing / permissions
  razorpay_flutter: ^1.4.5
  app_links: ^3.5.0
  share_plus: ^7.2.1
  url_launcher: ^6.3.0
  webview_flutter: ^4.7.0
  permission_handler: ^11.3.0
  pedometer: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - lib/assets/
    - lib/assets/myskates.png
    - lib/assets/banner1.png
    - lib/assets/images.png
    - lib/assets/imagess.png
    - lib/assets/img22.jpg
    - lib/assets/skate.jpg
    - lib/assets/skating.png
    - lib/assets/skating1.jpg
    - lib/assets/skating2.jpg
    - lib/assets/img.jpg
    - lib/assets/map_styles/black_white_map.json

  fonts:
    - family: Inter
      fonts:
        - asset: lib/assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: lib/assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
    - family: Poppins
      fonts:
        - asset: lib/assets/fonts/Poppins-Regular.ttf